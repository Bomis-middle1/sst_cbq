<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 6 - Chapter 11: Grassroots Democracy – Part 2 (Rural Local Government)</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e8d9b5,#f7f3e9,#d6b36a);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:220px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
    color:#3b2a1f;
}

/* Score */
#score{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(59,42,31,0.85);
    color:#fff;
    padding:20px;
    border-radius:15px;
    max-width:800px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:22px;
}

/* Options */
.option{
    display:block;
    margin:12px auto;
    padding:14px;
    width:80%;
    max-width:550px;
    background:#f7f3e9;
    border:2px solid #6b4f3a;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#fff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 6 - Chapter 11: Grassroots Democracy – Part 2 (Local Government in Rural Areas)</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"Heavy rains have damaged the village road leading to the school. Villagers want the issue to be discussed and resolved quickly. Which local body should first take up this matter?",
    o:[
        "Gram Panchayat",
        "Supreme Court",
        "Parliament",
        "Central Government"
    ],
    a:0
},
{
    q:"During a village meeting, adults discuss the need for a new handpump. Everyone shares opinions before a decision is made. Which democratic principle is being practiced?",
    o:[
        "Participation in decision-making",
        "Rule by one person",
        "Competition between villages",
        "Secret governance"
    ],
    a:0
},
{
    q:"Two farmers disagree about the boundary between their fields. They ask a village official to check old land records and measure the land. Who is most likely to help them?",
    o:[
        "Sarpanch",
        "Teacher",
        "Patwari",
        "Doctor"
    ],
    a:2
},
{
    q:"Look at the table:\n\nIssue / Responsible Body\nVillage water supply – Gram Panchayat\nDevelopment of several villages – Panchayat Samiti\nDistrict-wide coordination – Zila Parishad\n\nWhich body is responsible for coordinating work across the entire district?",
    o:[
        "Gram Sabha",
        "Gram Panchayat",
        "Panchayat Samiti",
        "Zila Parishad"
    ],
    a:3
},
{
    q:"Assertion: Panchayati Raj strengthens democracy in villages.\nReason: Villagers can participate in decisions that affect their lives.\n\nChoose the correct option:",
    o:[
        "Both statements are true, and the reason explains the assertion.",
        "Both statements are true, but the reason does not explain the assertion.",
        "Assertion is true, but reason is false.",
        "Assertion is false, but reason is true."
    ],
    a:0
},
{
    q:"Which one does NOT belong to the three-tier Panchayati Raj structure?",
    o:[
        "Gram Panchayat",
        "Panchayat Samiti",
        "Zila Parishad",
        "Parliament"
    ],
    a:3
},
{
    q:"Children in a village notice that some students are dropping out of school. They discuss the issue in a Bal Panchayat and suggest solutions to village leaders. What does this show?",
    o:[
        "Children cannot contribute to governance.",
        "Children can participate in community improvement.",
        "Only adults can solve village problems.",
        "Education is not a local issue."
    ],
    a:1
},
{
    q:"A group of villages needs funding for a new health centre that will serve all of them. Which level of Panchayati Raj is most likely to coordinate this project?",
    o:[
        "Gram Panchayat",
        "Panchayat Samiti",
        "Patwari Office",
        "Bal Sabha"
    ],
    a:1
},
{
    q:"A student writes:\n1. Gram Panchayat works at village level.\n2. Zila Parishad works at district level.\n3. Patwari keeps land records.\n4. Panchayat Samiti works only for one household.\nWhich statement is incorrect?",
    o:[
        "Statement 1",
        "Statement 2",
        "Statement 3",
        "Statement 4"
    ],
    a:3
},
{
    q:"A village wants to build a library. The villagers discuss the idea, vote on the location, and monitor the construction work. What is the biggest benefit of this process?",
    o:[
        "Decisions are made without consulting people.",
        "Villagers become active participants in governance.",
        "Only leaders benefit.",
        "Fewer people get involved."
    ],
    a:1
},
{
    q:"Sukhapur needs better roads, clean drinking water, and improved schools. The Gram Panchayat collects villagers’ suggestions. The Panchayat Samiti helps arrange funds, and the Zila Parishad ensures that the plans are coordinated across the district. Which statement best describes this process?",
    o:[
        "Only one level of government is responsible for development.",
        "Different levels of Panchayati Raj work together to solve local problems.",
        "Villagers have no role in development.",
        "Development projects are managed only by the state government."
    ],
    a:1
},
{
    q:"A village app shows that money has been approved for repairing a water tank, but the work has not started. Villagers use the app to raise questions during the Gram Sabha meeting. What value of democracy is being demonstrated?",
    o:[
        "Accountability",
        "Secrecy",
        "Competition",
        "Authority without questioning"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#d6b36a"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
