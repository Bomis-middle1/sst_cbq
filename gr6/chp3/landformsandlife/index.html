<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Landforms & Life - CBQ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom right, #dff5e1, #e6f3ff);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#splash img{
  width:240px;
  max-width:80%;
}

/* GAME */
#game{
  display:none;
  padding:20px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:20px;
  padding:10px;
}

.box{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 12px rgba(0,0,0,0.1);
}

#q{
  font-size:22px;
  font-weight:bold;
}

.option{
  display:block;
  margin:12px 0;
  padding:15px;
  font-size:18px;
  border:1px solid #ccc;
  border-radius:10px;
  cursor:pointer;
  background:#f8f8f8;
  transition:0.2s;
}

.option:hover{
  background:#eaf7ff;
}

.correct{background:#bff5bf !important;}
.wrong{background:#ffbdbd !important;}

#feedback{
  margin-top:15px;
  font-size:16px;
}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:40px;
}

button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img 
    src="/sst_cbq/gr6/chp3/landformsandlife/assets/logo.png"
    onerror="this.outerHTML='<h2>Innovine</h2>'"
  >
</div>

<!-- GAME -->
<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
  <h2>🌿 Great Thinking!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO (FIXED PATHS) -->
<audio id="correctSound" src="/sst_cbq/gr6/chp3/landformsandlife/assets/correct.mp3"></audio>
<audio id="wrongSound" src="/sst_cbq/gr6/chp3/landformsandlife/assets/wrong.mp3"></audio>
<audio id="clapSound" src="/sst_cbq/gr6/chp3/landformsandlife/assets/freesound_community-claps-44774.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadQ();
},5000);

let questions = [
{
q:"A farmer wants to use tractors for wheat farming. Which landform is best?",
o:["Mountain","Plain","Hill","Desert"],
a:1,
e:"Plains are flat and suitable for farming."
},
{
q:"A village gets water from melting snow. Where is it located?",
o:["Desert","Mountain","Coast","Island"],
a:1,
e:"Snowmelt comes from mountains."
},
{
q:"Which region is best for transport?",
o:["Flat fertile land","Steep mountains","Rocky peaks","Dense forests"],
a:0,
e:"Plains support transport easily."
},
{
q:"Mining and waterfalls are found in?",
o:["Plain","Plateau","Coast","Delta"],
a:1,
e:"Plateaus are rich in minerals."
},
{
q:"Fewer people live in mountains because:",
o:["Flat land missing","Life is difficult","Too many cities","No rivers"],
a:1,
e:"Harsh conditions reduce settlement."
},
{
q:"Which animal does NOT belong to mountains?",
o:["Yak","Snow Leopard","Camel","Goat"],
a:2,
e:"Camel lives in deserts."
},
{
q:"Terrace farming is used to:",
o:["Build cities","Grow crops on slopes","Stop rivers","Create roads"],
a:1,
e:"Prevents soil erosion."
},
{
q:"Wrong statement?",
o:["Plains fertile","Plateaus minerals","Mountains always hot","Rivers flow valleys"],
a:2,
e:"Mountains are cold."
},
{
q:"Rain shadow is caused by:",
o:["Oceans","Mountains blocking rain","Rivers","Forests"],
a:1,
e:"Mountains block moist winds."
},
{
q:"Best place for city:",
o:["Mountains","Plains","Glaciers","Deserts"],
a:1,
e:"Plains support growth."
}
];

let i=0,score=0,time=45,attempt=0,lock=false,interval;

/* TIMER */
function timer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time==0) next();
},1000);
}

/* LOAD */
function loadQ(){
lock=false;
attempt=0;
timer();

let q = questions[i];
document.getElementById("q").innerText = q.q;

let box = document.getElementById("options");
box.innerHTML="";
document.getElementById("feedback").innerText="";

q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
box.appendChild(d);
});
}

/* CHECK */
function check(ans,el){
if(lock) return;

let q = questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText =
"Correct Answer: " + q.o[q.a] + " → " + q.e;
lock=true;
setTimeout(next,2500);
}
}
}

/* NEXT */
function next(){
i++;
if(i<questions.length){
loadQ();
}else end();
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText =
"Final Score: " + score + "/" + questions.length;
}

</script>

</body>
</html>
