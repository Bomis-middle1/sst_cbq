<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - India’s Cultural Roots</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e8d9b5,#f7f3e9,#d6b36a);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:220px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Score */
#score{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(59,42,31,0.85);
    color:#fff;
    padding:20px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:22px;
}

/* Options */
.option{
    display:block;
    margin:12px auto;
    padding:14px;
    width:80%;
    max-width:500px;
    background:#f7f3e9;
    border:2px solid #6b4f3a;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#fff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="assets/logo.png">
</div>

<!-- GAME -->
<div id="game">
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled at start)
let questions = [
{
    q:"A student wants to learn about the earliest source of knowledge that shaped many Indian religious and philosophical traditions. Which source should the student study?",
    o:["Jataka Tales","Vedas","Folk songs","Travel diaries"],
    a:1
},
{
    q:"During a class discussion, Ananya says: \"People in ancient India first memorised sacred texts and passed them from teacher to student before writing them down.\" Which texts is she most likely talking about?",
    o:["Jataka Tales","Tribal legends","Vedas","Royal inscriptions"],
    a:2
},
{
    q:"Assertion: The Upanishads focus on understanding the self and the purpose of life. Reason: They discuss ideas such as Brahman and Atman.",
    o:[
        "Both are true, and the reason explains the assertion.",
        "Both are true, but the reason does not explain the assertion.",
        "Assertion is true, but reason is false.",
        "Assertion is false, but reason is true."
    ],
    a:0
},
{
    q:"Rahul notices that his friend always tells the truth, even when it is difficult. Which story from the chapter highlights a similar value?",
    o:["The Golden Deer","Satyakama and the Bull","The Hare and the Moon","The Two Birds"],
    a:1
},
{
    q:"A teacher prepares the following chart:\n\nSchool of Thought / Accepts Vedas?\nOrthodox (Astika) - Yes\nBuddhism - No\nJainism - No\n\nBased on the chart, which conclusion is correct?",
    o:[
        "Buddhism and Jainism accepted the authority of the Vedas.",
        "Only Orthodox schools accepted the Vedas.",
        "All schools followed exactly the same beliefs.",
        "Jainism was part of the Vedas."
    ],
    a:1
},
{
    q:"A person wants to reduce anger, greed, and attachment in daily life and believes that controlling desires can reduce suffering. Whose teachings does this idea most closely relate to?",
    o:["A Vedic king","Buddha","A tribal chief","A trader"],
    a:1
},
{
    q:"A student writes the following points about Jainism:\n1. Mahavira was born into a royal family.\n2. Jainism teaches ahimsa.\n3. Mahavira left his royal life to seek wisdom.\n4. Jainism encourages harming animals during rituals.\nWhich statement is incorrect?",
    o:["Statement 1","Statement 2","Statement 3","Statement 4"],
    a:3
},
{
    q:"A village community protects forests, rivers, and hills because they believe nature has spiritual importance. Which tradition does this best represent?",
    o:["Industrial tradition","Tribal tradition","Modern political tradition","Military tradition"],
    a:1
},
{
    q:"Many tribal communities worship rivers, mountains, trees, and animals. What lesson can people learn from this practice today?",
    o:[
        "Natural resources should be ignored.",
        "Nature should be respected and protected.",
        "Only mountains are important.",
        "People should stop farming."
    ],
    a:1
},
{
    q:"A student reads a story in which one bird eats sweet and bitter fruits while another bird quietly watches without getting affected. What is the main lesson of this story?",
    o:[
        "Birds should live separately.",
        "Food is more important than wisdom.",
        "Inner peace comes from understanding the higher self.",
        "Trees are the source of all knowledge."
    ],
    a:2
},
{
    q:"Your school wants to create a \"Values Week.\" Which activity best reflects the teachings found in the Vedas, Buddhism, and Jainism?",
    o:[
        "Organising a competition to waste the most paper",
        "Practising honesty, kindness, and non-violence throughout the week",
        "Ignoring classmates who need help",
        "Collecting the most expensive items"
    ],
    a:1
},
{
    q:"India's culture is often compared to a river fed by many streams. Which example best supports this idea?",
    o:[
        "Only one tradition shaped Indian culture.",
        "Folk, tribal, Vedic, Buddhist, and Jain traditions all contributed to Indian culture.",
        "Tribal traditions had no influence on Indian culture.",
        "Ancient traditions disappeared completely."
    ],
    a:1
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#d6b36a"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
