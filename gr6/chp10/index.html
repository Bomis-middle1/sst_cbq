<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 6 - Chapter 10: Grassroots Democracy – Part 1 Governance</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e8d9b5,#f7f3e9,#d6b36a);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:220px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
    color:#3b2a1f;
}

/* Score */
#score{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(59,42,31,0.85);
    color:#fff;
    padding:20px;
    border-radius:15px;
    max-width:800px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:22px;
}

/* Options */
.option{
    display:block;
    margin:12px auto;
    padding:14px;
    width:80%;
    max-width:550px;
    background:#f7f3e9;
    border:2px solid #6b4f3a;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#fff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 6 - Chapter 10: Grassroots Democracy – Part 1 Governance</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"After heavy rain, a village road is filled with potholes. The villagers inform the local authorities to repair it. Which level of government will usually take the first responsibility for this problem?",
    o:[
        "Local government",
        "State government",
        "Central government",
        "Judiciary"
    ],
    a:0
},
{
    q:"A school wants a new playground. The student council asks all students to vote between two possible locations. The location with the most votes is selected. What democratic idea is being used here?",
    o:[
        "Rule by one person",
        "Voting and participation",
        "Military rule",
        "Inheritance of power"
    ],
    a:1
},
{
    q:"A new law is proposed to improve online healthcare services across the country. Which organ of government is responsible for making this law?",
    o:[
        "Executive",
        "Judiciary",
        "Legislature",
        "Police"
    ],
    a:2
},
{
    q:"Assertion: Judges help solve disputes fairly.\nReason: The Judiciary ensures that laws are applied correctly.\n\nChoose the correct option:",
    o:[
        "Both statements are true, and the reason explains the assertion.",
        "Both statements are true, but the reason does not explain the assertion.",
        "Assertion is true, but reason is false.",
        "Assertion is false, but reason is true."
    ],
    a:0
},
{
    q:"A village faced a flood.\n\nHelp Received / Provider\nRescue boats – State Government\nFood packets in village – Local Government\nArmy assistance – Central Government\n\nWho arranged rescue boats for the villagers?",
    o:[
        "Local Government",
        "State Government",
        "Judiciary",
        "Village shopkeepers"
    ],
    a:1
},
{
    q:"Which of these does NOT belong with the Executive?",
    o:[
        "Running hospitals",
        "Implementing laws",
        "Managing departments",
        "Interpreting laws"
    ],
    a:3
},
{
    q:"A group of citizens feels a new rule is unfair and files a case in court. Which organ of government will examine the issue?",
    o:[
        "Legislature",
        "Executive",
        "Judiciary",
        "Local market committee"
    ],
    a:2
},
{
    q:"During a village meeting, residents discuss where a new market should be built. Everyone shares ideas before a final decision is made. What value of democracy is shown?",
    o:[
        "Secrecy",
        "Participation",
        "Competition only",
        "Obedience without discussion"
    ],
    a:1
},
{
    q:"A student made these notes:\n1. Legislature makes laws.\n2. Executive implements laws.\n3. Judiciary settles disputes.\n4. Executive interprets laws.\nWhich statement is incorrect?",
    o:[
        "Statement 1",
        "Statement 2",
        "Statement 3",
        "Statement 4"
    ],
    a:3
},
{
    q:"A city wants to start a waste recycling programme for all neighbourhoods. The plan requires cooperation between residents and local authorities. Why is governance important in this situation?",
    o:[
        "It helps people work together through rules and decisions.",
        "It allows only leaders to make all decisions.",
        "It prevents citizens from participating.",
        "It removes the need for rules."
    ],
    a:0
},
{
    q:"A village wants to build a new water tank. The villagers discuss different locations and vote for the best option. After the decision, local officials supervise the construction, and a court settles a land dispute related to the project. Which option correctly matches the roles?",
    o:[
        "Legislature votes, Executive settles disputes, Judiciary builds tank",
        "Executive votes, Judiciary builds tank, Legislature settles disputes",
        "Legislature makes decisions/rules, Executive carries out work, Judiciary settles disputes",
        "Judiciary makes rules, Legislature builds tank, Executive settles disputes"
    ],
    a:2
},
{
    q:"A citizen votes during an election because she wants leaders who will improve healthcare and education. What is the main purpose of her vote?",
    o:[
        "To choose representatives who make decisions for the people",
        "To become a government official immediately",
        "To avoid following laws",
        "To remove democracy"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#d6b36a"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
