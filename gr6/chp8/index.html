<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 6 - Chapter 8: Unity in Diversity</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e8d9b5,#f7f3e9,#d6b36a);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:220px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:15px;
    font-size:22px;
    font-weight:bold;
    color:#3b2a1f;
}

/* Score */
#score{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(59,42,31,0.85);
    color:#fff;
    padding:20px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:22px;
}

/* Options */
.option{
    display:block;
    margin:12px auto;
    padding:14px;
    width:80%;
    max-width:500px;
    background:#f7f3e9;
    border:2px solid #6b4f3a;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#fff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 6 - Chapter 8: Unity in Diversity</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (will be shuffled once at start)
let questions = [
{
    q:"Rehan's class is preparing a cultural exhibition. One group displays the Himalayas, another shows the Thar Desert, and a third presents Kerala's backwaters. What does this exhibition mainly show?",
    o:[
        "India has only one type of landscape",
        "India has geographical diversity",
        "Only mountains are important in India",
        "Every state has the same climate"
    ],
    a:1
},
{
    q:"During a school food festival, students bring dhokla, idli, butter chicken, and roshogolla from different states. What can students learn from this activity?",
    o:[
        "People in India eat exactly the same food",
        "Only one region has special dishes",
        "Different regions have unique foods that enrich Indian culture",
        "Traditional food is not important"
    ],
    a:2
},
{
    q:"A teacher surveyed students about the staple food eaten at home.\n\nFood / Number of Students\nRice – 18\nWheat – 15\nMillets – 7\n\nWhat does the table suggest?",
    o:[
        "Everyone eats only rice",
        "Different staple foods are used by different families",
        "Wheat is not eaten in India",
        "Millets are the most common food"
    ],
    a:1
},
{
    q:"Karan celebrates Diwali with one friend, Eid with another, and Christmas with a third friend. What is the best lesson from Karan's experience?",
    o:[
        "Only one festival should be celebrated",
        "Festivals should be celebrated separately",
        "Different festivals can bring people together and strengthen friendship",
        "Festivals are important only for children"
    ],
    a:2
},
{
    q:"Statement: India is called a land of diversity.\nReason: People in India follow different languages, traditions, foods, and religions.\n\nChoose the correct option:",
    o:[
        "Both are true and the reason explains the statement",
        "Both are true but not related",
        "Statement is true but reason is false",
        "Statement is false but reason is true"
    ],
    a:0
},
{
    q:"Students observe sarees from Tamil Nadu, Gujarat, Uttar Pradesh, and Maharashtra. What does this show?",
    o:[
        "Sarees look exactly the same everywhere",
        "Clothing reflects regional traditions and culture",
        "Sarees are worn only in villages",
        "Every state uses the same weaving style"
    ],
    a:1
},
{
    q:"Which does NOT belong with India's major harvest festivals?",
    o:[
        "Pongal",
        "Baisakhi",
        "Onam",
        "Christmas"
    ],
    a:3
},
{
    q:"A tourist travels from Punjab to Kerala and notices changes in food, language, and clothing. What remains common despite these differences?",
    o:[
        "Every person speaks the same language",
        "Shared identity as Indians",
        "Everyone wears the same clothes",
        "Every region grows the same crops"
    ],
    a:1
},
{
    q:"A student made these notes:\n1. Banarasi Saree – Uttar Pradesh\n2. Kanjeevaram Saree – Tamil Nadu\n3. Patola Saree – Gujarat\n4. Banarasi Saree – Kerala\nWhich note is incorrect?",
    o:[
        "Note 1",
        "Note 2",
        "Note 3",
        "Note 4"
    ],
    a:3
},
{
    q:"A new student joins a school from another state and speaks a different language. Some classmates invite the student to join activities and learn together. Which value are the classmates showing?",
    o:[
        "Exclusion",
        "Competition",
        "Respect for diversity and inclusion",
        "Regionalism"
    ],
    a:2
},
{
    q:"A village celebrates Pongal, grows rice, and many people wear traditional South Indian clothes. Which region of India is most likely being described?",
    o:[
        "Punjab",
        "Rajasthan",
        "Tamil Nadu",
        "Himachal Pradesh"
    ],
    a:2
},
{
    q:"India has many languages, religions, foods, and traditions. Yet it is often described as \"Unity in Diversity.\" Why?",
    o:[
        "Everyone follows the same customs",
        "Differences are ignored completely",
        "People respect differences while sharing common values and national identity",
        "Diversity exists only in a few states"
    ],
    a:2
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#d6b36a"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
