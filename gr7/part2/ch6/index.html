<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Civic Core Arena: Who Rules?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
:root{
  --parliament-blue:#0f172a;
  --const-gold:#d97706;
  --ash-blue:#334155;
  --court-cream:#f8fafc;
  --card-bg:#1e293b;
  --text-muted:#cbd5e1;
  --emerald-pass:#10b981;
  --emerald-bg:rgba(16,185,129,0.12);
  --crimson-fail:#ef4444;
  --crimson-bg:rgba(239,68,68,0.12);
}
body{background:linear-gradient(145deg,var(--parliament-blue),#020617);min-height:100vh;color:var(--court-cream);padding:16px;display:flex;align-items:center;justify-content:center}

/* Container Framework */
.hidden { display: none !important; }
.civic-card { background: var(--card-bg); width: 100%; max-width: 680px; padding: 28px; border-radius: 14px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(217,119,6,0.2); position: relative; transition: all 0.3s ease; }
@media (max-width: 480px) { .civic-card { padding: 18px; } }
.civic-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:linear-gradient(90deg, var(--const-gold), #fbbf24, var(--court-cream)); border-radius:14px 14px 0 0; }
.center { text-align: center; }
.badge { display: inline-block; background: rgba(217,119,6,0.1); color: #fbbf24; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(217,119,6,0.25); margin-bottom: 18px; }

/* Dashboard HUD */
.hud-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:11px; font-weight:700; color:var(--text-muted); border-bottom:1px solid rgba(255,255,255,0.06); padding-bottom:10px; text-transform:uppercase; letter-spacing:1px }
.hud-bar span { color: #fbbf24; }

/* Timeline Nodes */
.timeline-track{display:flex;gap:4px;margin-bottom:22px}
.track-node{height:4px;flex:1;background:rgba(255,255,255,0.08);border-radius:2px;transition:all .3s ease}
.track-node.active{background:#fbbf24;box-shadow:0 0 8px #fbbf24}
.track-node.passed{background:var(--const-gold)}

/* Document Context Box */
.context-box { background: rgba(15,23,42,0.6); border-left: 3px solid var(--const-gold); padding: 14px; margin-bottom: 20px; border-radius: 0 6px 6px 0; font-size: 14px; line-height: 1.55; color: #e2e8f0; }

/* Option Matrix selection layout */
h2{font-size:17px;line-height:1.45;color:var(--court-cream);margin-bottom:20px;font-weight:600}
.options-matrix{display:flex;flex-direction:column;gap:10px}
.option-row{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:14px;cursor:pointer;font-size:14px;line-height:1.4;transition:all 0.2s ease;display:flex;align-items:start;gap:10px}
.option-row:hover{background:rgba(217,119,6,0.04);border-color:rgba(217,119,6,0.35);transform:translateX(2px)}
.label-index{font-weight:700;color:#fbbf24}

/* System Messages */
.msg-box{margin-top:18px;padding:14px;border-radius:6px;font-size:13.5px;line-height:1.5}
.msg-pass{background:var(--emerald-bg);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.msg-fail{background:var(--crimson-bg);color:#f87171;border:1px solid rgba(239,68,68,0.2)}

button.action-btn{width:100%;background:linear-gradient(135deg, var(--ash-blue), #1e293b);border:1px solid rgba(217,119,6,0.3);color:white;padding:14px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:18px;transition:all .2s ease}
button.action-btn:hover{background:linear-gradient(135deg, #475569, #334155);box-shadow:0 4px 12px rgba(217,119,6,0.15)}
</style>
</head>
<body>

<div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#ffffff;display:flex;justify-content:center;align-items:center;z-index:99999;transition:opacity .3s ease">
  <div class="center">
    <img id="logo" src="assets/innovine-logo.png" alt="Logo" style="width:240px;height:auto;" onerror="this.style.display='none'; document.getElementById('splash-alt').style.display='block';">
    <h1 id="splash-alt" style="display:none;color:#0f172a;letter-spacing:2px;font-weight:800;font-size:20px;">INNOVINE LEARNING</h1>
  </div>
</div>

<div id="welcome-card" class="civic-card center hidden">
  <div class="badge">Constitutional Lab</div>
  <h1 style="font-size:22px;margin-bottom:10px;">Chapter 6: Who Rules?</h1>
  <p style="color:var(--text-muted);font-size:14px;line-height:1.5;margin-bottom:20px">Explore states, governing frameworks, the separation of structural powers, and your role as an active citizen holding power accountable.</p>
  <div style="font-size:40px;margin-bottom:18px">⚖️🏛️📜</div>
  <button class="action-btn" onclick="startApp()">Enter Assessment</button>
</div>

<div id="test-card" class="civic-card hidden">
  <div class="hud-bar">
    <div id="section-title">Evaluation Unit</div>
    <div>Score: <span id="live-score">0</span></div>
  </div>
  <div class="timeline-track" id="track-holder"></div>
  <div id="context-view" class="context-box hidden"></div>
  <h2 id="question-view"></h2>
  <div class="options-matrix" id="options-holder"></div>
  <div id="feedback-view"></div>
  <button id="next-btn" class="action-btn hidden" onclick="nextStep()">Commit & Continue →</button>
</div>

<div id="score-card" class="civic-card center hidden">
  <div style="font-size:50px;margin-bottom:12px" id="end-emoji"></div>
  <h1 id="end-title" style="margin-bottom:8px;"></h1>
  <p id="end-desc" style="color:var(--text-muted);font-size:14px;margin-bottom:20px"></p>
  <div class="badge" id="end-rank"></div>
  <br><br>
  <button class="action-btn" onclick="window.location.reload()">Restart Verification</button>
</div>

<audio id="audio-pass" src="assets/correct.mp3" preload="auto"></audio>
<audio id="audio-fail" src="assets/wrong.mp3" preload="auto"></audio>

<script>
window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    const sp = document.getElementById('splash');
    sp.style.opacity = '0';
    setTimeout(()=>{
      sp.style.display = 'none';
      document.getElementById('welcome-card').classList.remove('hidden');
    },300);
  },1200);
});

const cbqDataset = [
  {
    q: "An international relations scholar argues that an entity cannot be recognized as a fully functional state if it lacks control over its internal affairs or must take legal orders from a foreign kingdom. Which essential element of a state is this scholar emphasizing?",
    o: ["Defined Geographic Territory", "Permanent Core Population", "Supreme Sovereignty", "A Multi-tier Bureaucracy"],
    a: 2,
    e: "Sovereignty means the state possesses supreme legal authority within its territory and is completely independent from outside dictation or external governance."
  },
  {
    case: "<b>The School Analogy:</b><br>'Think of the state as a school building and institution. The school exists regardless of who the principal is. Similarly, when a new government is elected, the state continues. The government serves the state; the state does not depend on any single government.'",
    q: "Based on the textbook's school analogy, which statement correctly differentiates a state from a government?",
    o: [
      "The government is an abstract concept, while the state consists of visible, concrete leaders.",
      "The state includes all four elements and is permanent, while the government is a temporary mechanism that changes via elections.",
      "The state represents only the ruling political party, while the government represents the entire history of the nation.",
      "The government is completely independent of the state and operates in a separate territory."
    ],
    a: 1,
    e: "The state is permanent and continuous, encompassing people, territory, government, and sovereignty, whereas the government is just one component that shifts during general elections."
  },
  {
    q: "A civic task force is organizing a chart to explain the Separation of Powers in the Indian system. If a municipal worker is physically building a public highway using funds from an approved budget bill, which branches of government have acted to make this happen?",
    o: [
      "The Judiciary interpreted the highway code, and the Legislature paved the road.",
      "The Legislature passed the law/budget, and the Executive implemented the construction work.",
      "The Executive drafted the law, and the Judiciary managed the project administration.",
      "The local Panchayats overrode the Parliament to direct the federal funds."
    ],
    a: 1,
    e: "The Legislature is the branch that creates laws and approves budgets, while the Executive (including ministries and the bureaucracy) is responsible for turning those laws into active implementation."
  },
  {
    q: "A political scientist notes that the Rajya Sabha (Council of States) acts as a crucial balance within India's lawmaking apparatus. Which feature distinguishes the Rajya Sabha from the Lok Sabha?",
    o: [
      "Its members are elected directly by everyday voters from local constituencies.",
      "It has exclusive legislative power to pass or reject Money Bills.",
      "It is a permanent body where one-third of its members retire every two years.",
      "Its term automatically ends exactly five years after a general election."
    ],
    a: 2,
    e: "Unlike the Lok Sabha, which has a 5-year term and can be dissolved, the Rajya Sabha is a permanent body whose members are elected by State Legislative Assemblies, with one-third retiring every two years."
  },
  {
    q: "An applicant successfully clears the rigorous Union Public Service Commission (UPSC) competitive examinations and joins the Indian Administrative Service (IAS) as a district collector. Which branch of the executive do they now represent?",
    o: ["The Political Executive", "The Permanent Executive", "The Judicial Tribunal", "The Legislative Council"],
    a: 1,
    e: "The permanent executive consists of non-elected civil servants (like IAS, IPS, and IFS officers) who enter through competitive examinations and provide governance continuity across changes in political leadership."
  },
  {
    q: "Assertion (A): India is described in its constitutional Preamble as both a democracy and a republic.\nReason (R): All adult citizens hold ultimate power through free elections, and the highest head of state (the President) is an elected official rather than a hereditary ruler.",
    o: [
      "Both A and R are true and R explains A.",
      "Both A and R are true but R does not explain A.",
      "A is true but R is false.",
      "A is false but R is true."
    ],
    a: 0,
    e: "India is a democracy because citizens exercise authority through elected representatives, and it is a republic because its supreme head of state is elected and limited by a constitution, rather than inheriting power by birth."
  },
  {
    q: "A citizen discovers that a local government department is refusing to provide clean drinking water to a specific community based on discrimination. Which Fundamental Right can this community invoke to directly petition the Supreme Court of India for an enforcement remedy?",
    o: [
      "Right to Freedom of Religion (Articles 25–28)",
      "Right against Exploitation (Articles 23–24)",
      "Right to Constitutional Remedies (Article 32)",
      "Cultural & Educational Rights (Articles 29–30)"
    ],
    a: 2,
    e: "Article 32 (Right to Constitutional Remedies) explicitly empowers citizens to approach the Supreme Court directly to enforce and protect all other Fundamental Rights if they are breached."
  },
  {
    q: "A village resident wants to check the official list of responsibilities handled at the lowest level of India's three-tier federal structure. Which of these duties falls under the direct authority of a Local Government (Panchayat/Municipality) rather than the Union Government?",
    o: [
      "Managing national defense systems and space programs",
      "Operating railways, national highways, and printing currency",
      "Organizing sanitation, drainage, streetlights, and local village fairs",
      "Creating international foreign treaties and setting income tax rates"
    ],
    a: 2,
    e: "Under the decentralized three-tier system, local everyday matters like drinking water, sanitation, streetlights, and local fairs are explicitly managed by village and town local bodies."
  },
  {
    case: "<b>The Chipko Movement:</b><br>'In 1973, in Chamoli district, rural women wrapped their arms around trees to stop commercial logging contractors. This peaceful, non-violent protest spread rapidly and eventually pressured Prime Minister Indira Gandhi to issue a 15-year ban on tree felling in the region.'",
    q: "The success of the historic Chipko Movement is a powerful real-world example of:",
    o: [
      "Purely legal actions replacing the need for voter participation.",
      "Grassroots democracy where ordinary citizens with no wealth can shape national policy through conviction.",
      "The complete failure of local environmental regulations under a centralized state.",
      "Direct enforcement of judicial review by the Supreme Court."
    ],
    a: 1,
    e: "The Chipko Movement illustrates how decentralized, peaceful citizen movements can successfully hold authorities accountable and shift national legislative frameworks from the bottom up."
  },
  {
    q: "In his ancient political treatise Arthashastra, written around 300 BCE, Kautilya warns of a dangerous societal condition known as Matsya Nyaya. What does this concept mean, and how does good governance prevent it?",
    o: [
      "It refers to sea trade laws, prevented by expanding maritime navies.",
      "It means the 'law of the fish' where the strong exploit the weak, prevented by a just ruler following Raja Dharma.",
      "It refers to the collection of land revenues, prevented by auditing civil servants.",
      "It describes a rule by a single hereditary family, prevented by democratic elections."
    ],
    a: 1,
    e: "Matsya Nyaya describes a chaotic state of nature where the strong exploit the weak. Kautilya argued that a state must enforce good governance (Raja Dharma) to preserve civil justice and protect the vulnerable."
  }
];

let pointer = 0;
let userScore = 0;
let strikeLock = false;

function startApp(){
  document.getElementById('welcome-card').classList.add('hidden');
  document.getElementById('test-card').classList.remove('hidden');
  buildTrackNodes();
  displayQuizItem();
}

function buildTrackNodes(){
  const holder = document.getElementById('track-holder');
  holder.innerHTML = '';
  cbqDataset.forEach(()=>{
    let node = document.createElement('div');
    node.className = 'track-node';
    holder.appendChild(node);
  });
}

function displayQuizItem(){
  strikeLock = false;
  document.getElementById('feedback-view').innerHTML = '';
  document.getElementById('next-btn').classList.add('hidden');

  const nodes = document.querySelectorAll('.track-node');
  nodes.forEach((nd, i)=>{
    if(i === pointer) nd.className = 'track-node active';
    else if(i < pointer) nd.className = 'track-node passed';
    else nd.className = 'track-node';
  });

  if(pointer >= 7){
    document.getElementById('section-title').textContent = "⚠️ Final Challenge Cluster";
    document.getElementById('section-title').style.color = "#fbbf24";
  } else {
    document.getElementById('section-title').textContent = "Standard Evaluation Unit";
    document.getElementById('section-title').style.color = "var(--text-muted)";
  }

  const currentObj = cbqDataset[pointer];
  
  const ctxView = document.getElementById('context-view');
  if(currentObj.case){
    ctxView.innerHTML = currentObj.case;
    ctxView.classList.remove('hidden');
  } else {
    ctxView.classList.add('hidden');
  }

  document.getElementById('question-view').innerHTML = `${pointer + 1}. ${currentObj.q.replace(/\n/g, '<br>')}`;
  
  const optHolder = document.getElementById('options-holder');
  optHolder.innerHTML = '';

  const prefixes = ['A','B','C','D'];
  currentObj.o.forEach((txt, idx)=>{
    let row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `<span class="label-index">${prefixes[idx]}.</span> <span>${txt}</span>`;
    row.onclick = () => selectOpt(idx, row);
    optHolder.appendChild(row);
  });
}

function triggerAudio(soundId) {
  const audio = document.getElementById(soundId);
  if(audio) {
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }
}

function selectOpt(idx, element){
  const currentObj = cbqDataset[pointer];
  if(idx === currentObj.a){
    if(!strikeLock){
      userScore++;
      document.getElementById('live-score').textContent = userScore;
    }
    triggerAudio('audio-pass');
    document.getElementById('feedback-view').innerHTML = `<div class="msg-box msg-pass"><b>✓ Confirmed Analysis.</b> ${currentObj.e}</div>`;
    freezeOptions();
    document.getElementById('next-btn').classList.remove('hidden');
  } else {
    if(!strikeLock){
      strikeLock = true;
      triggerAudio('audio-fail');
      element.style.borderColor = 'var(--crimson-fail)';
      element.style.background = 'var(--crimson-bg)';
      document.getElementById('feedback-view').innerHTML = `<div class="msg-box msg-fail"><b>⚠️ Alternative Vector.</b> This interpretation contradicts core structural or constitutional logic outlined in the chapter. Review your dataset points.</div>`;
    } else {
      revealKey();
    }
  }
}

function revealKey(){
  freezeOptions();
  const currentObj = cbqDataset[pointer];
  const alpha = ['A','B','C','D'];
  document.getElementById('feedback-view').innerHTML = `<div class="msg-box msg-fail"><b>🔍 Resolution.</b> The validated system determination is <b>${alpha[currentObj.a]}. ${currentObj.o[currentObj.a]}</b>.<br><br>${currentObj.e}</div>`;
  document.getElementById('next-btn').classList.remove('hidden');
}

function freezeOptions(){
  document.querySelectorAll('.option-row').forEach(row => row.onclick = null);
}

function nextStep(){
  pointer++;
  if(pointer < cbqDataset.length){
    displayQuizItem();
  } else {
    finishApp();
  }
}

function finishApp(){
  document.getElementById('test-card').classList.add('hidden');
  document.getElementById('score-card').classList.remove('hidden');

  const emo = document.getElementById('end-emoji');
  const tit = document.getElementById('end-title');
  const des = document.getElementById('end-desc');
  const rnk = document.getElementById('end-rank');

  des.textContent = `You verified ${userScore} out of ${cbqDataset.length} competency metrics accurately.`;

  if(userScore >= 9){
    emo.textContent = '🏛️';
    tit.textContent = 'Constitutional Counsel';
    rnk.textContent = 'Tier 1 Analyst';
  } else if(userScore >= 6){
    emo.textContent = '📜';
    tit.textContent = 'Civic Magistrate';
    rnk.textContent = 'Tier 2 Evaluator';
  } else {
    emo.textContent = '⚓';
    tit.textContent = 'Apprentice Scribe';
    rnk.textContent = 'Tier 3 Reviewer';
  }
}
</script>
</body>
</html>

```
