<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transport & Communication - HOTS CBQ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#e0f7ff,#e8ffe8,#fff4d6);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{width:220px;}

/* GAME */
#game{
  display:none;
  padding:15px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  padding:10px;
}

.box{
  max-width:850px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.option{
  display:block;
  margin:10px 0;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  background:#f8f8f8;
  transition:0.2s;
}

.option:hover{background:#eef9ff;}

.correct{background:#bff5bf !important;}
.wrong{background:#ffbdbd !important;}

.locked{pointer-events:none;}

#feedback{
  margin-top:10px;
  font-size:14px;
  color:#333;
}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:30px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#4caf50;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/logo.png">
</div>

<!-- GAME -->
<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <h3 id="q"></h3>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
  <h2>🎉 Excellent Thinking!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadQ();
},5000);

let questions=[
{
q:"A farmer needs to send apples across India. What is the most efficient transport choice?",
o:["Air transport for all","Rail freight wagons","Bicycle delivery","Walking delivery"],
a:1,
e:"Rail is best for bulk goods over long distances."
},
{
q:"Neha travels 500m daily in a hilly town. What is the most sensible choice?",
o:["Airplane","Ship","Bicycle","Train"],
a:2,
e:"Short distance travel suits cycling in such terrain."
},
{
q:"A family must travel urgently from Mumbai to Delhi. Which reasoning is correct?",
o:["Bus is cheapest so best","Train is slow but safe","Airplane is fastest for urgency","Ship is comfortable"],
a:2,
e:"Speed is most important in emergencies."
},
{
q:"During floods, roads are blocked. Medicines must reach village immediately. What is best decision?",
o:["Bullock cart","Bicycle","Air transport","Metro rail"],
a:2,
e:"Air transport bypasses blocked routes."
},
{
q:"Which option improves communication rather than transport?",
o:["Building highways","Expanding internet networks","Making bridges","Widening roads"],
a:1,
e:"Internet improves communication systems."
},
{
q:"Oil must be transported between countries at lowest cost. Best choice?",
o:["Air cargo","Water tankers","Bicycle","Metro train"],
a:1,
e:"Ships carry large quantities cheaply."
},
{
q:"Digital communication works mainly because:",
o:["Roads connect countries","Internet enables instant data transfer","Telephones work without wires","Letters travel fast physically"],
a:1,
e:"Internet enables global instant communication."
},
{
q:"Which statement about communication is incorrect?",
o:["Email uses internet","SMS sends short messages","Radio gives news","Video calls require meeting physically"],
a:3,
e:"Video calls do not need physical meeting."
},
{
q:"A school wants to announce results to all students at once. Best method?",
o:["One-to-one call","Personal letter","School broadcast system","Individual SMS"],
a:2,
e:"Broadcast reaches everyone simultaneously."
},
{
q:"Best balanced transport for 2 km daily travel considering environment?",
o:["Car","Cycle","Ship","Bullock cart"],
a:1,
e:"Cycle is eco-friendly and practical."
},
{
q:"Best sustainable community investment?",
o:["Decorative park only","Plant trees + rainwater harvesting","Street lighting only","One awareness event"],
a:1,
e:"Long-term environmental impact solution."
},
{
q:"Transport choice with best balance of speed and efficiency for most cities?",
o:["Airplane","Bicycle","Train network","Walking only"],
a:2,
e:"Trains balance cost, speed and capacity."
}
];

let i=0,score=0,time=45,lock=false,attempt=0,interval;

function timer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time==0) next();
},1000);
}

function loadQ(){
lock=false;
attempt=0;
timer();

let q=questions[i];
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";
document.getElementById("feedback").innerText="";

q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
box.appendChild(d);
});
}

function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText="Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2500);
}
}
}

function next(){
i++;
if(i<questions.length){
loadQ();
}
else end();
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText="Final Score: "+score+"/"+questions.length;
}

</script>

</body>
</html>
