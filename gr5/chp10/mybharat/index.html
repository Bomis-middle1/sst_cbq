<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bharat CBQ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  color:#111; /* Changed to dark text for contrast against light backgrounds */
  /* Tricolour Gradient Background */
  background: linear-gradient(135deg, #FF9933 0%, #FFFFFF 50%, #128807 100%);
  height: 100vh;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{
  width:220px;
}

/* GAME */
#game{
  display:none;
  padding:20px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  font-weight:bold;
  color: #000080; /* Ashoka Chakra Navy Blue */
  max-width: 900px;
  margin: 0 auto 15px auto;
}

.box{
  max-width:900px;
  margin:auto;
  background: rgba(255, 255, 255, 0.95); /* Semi-transparent clean white box */
  padding:25px;
  border-radius:15px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  border: 2px solid #000080; /* Navy Blue Accent Border */
}

#q{
  font-size:24px;
  font-weight:bold;
  margin-bottom:15px;
  line-height: 1.4;
  white-space: pre-line;
  color: #222;
}

/* TABLE STYLING */
.q-table {
  width: 80%;
  margin: 15px auto;
  border-collapse: collapse;
  background: #fff;
  color: #000;
}
.q-table th, .q-table td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: left;
}
.q-table th {
  background: #f2f2f2;
}

.option{
  display:block;
  margin:10px 0;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  background:#f9f9f9;
  border:1px solid #ddd;
  cursor:pointer;
  text-align: left;
  color: #333;
  transition: 0.2s ease;
}

.option:hover{
  background:#eee;
  border-color: #000080;
}

/* Clear distinction for correctness */
.correct{
  background:#128807 !important; 
  color: #fff !important;
  border-color: #128807 !important;
}
.wrong{
  background:#b32424 !important; 
  color: #fff !important;
  border-color: #b32424 !important;
}

#feedback{
  margin-top:10px;
  font-size:16px;
  color:#b32424;
  font-weight: bold;
}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:40px;
  background: rgba(255, 255, 255, 0.95);
  max-width: 500px;
  margin: 100px auto;
  border-radius: 15px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  border: 3px solid #000080;
}

#result h2 {
  color: #FF9933;
  font-size: 32px;
}

#final {
  font-size: 24px;
  color: #128807;
  font-weight: bold;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#000080;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  font-weight: bold;
}
button:hover {
  background: #000066;
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/logo.png">
</div>

<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<div id="result">
  <h2>🇮🇳 Excellent!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

let i=0;
let score=0;
let time=45;
let attempt=0;
let lock=false;
let interval;

/* TIMER FIXED */
function startTimer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) next();
},1000);
}

/* 12 CBQ QUESTIONS */
const questions=[
{
q:"Emma is visiting Bengaluru for the first time. She wants to greet local people and ask for directions using the language commonly spoken there.\n\nWhich language should Emma learn?",
o:["Marathi","Kannada","Tamil","Telugu"],
a:1,
e:"Kannada is the official and most widely spoken language in Bengaluru."
},
{
q:"\"Visit one of the Seven Wonders of the World. This beautiful white marble monument is located in Agra and attracts visitors from all over the world.\"\n\nIn which state is this monument located?",
o:["Rajasthan","Maharashtra","Uttar Pradesh","Gujarat"],
a:2,
e:"Agra and the Taj Mahal are located in Uttar Pradesh."
},
{
q:"Study the table below:\n<table class='q-table'><tr><th>State</th><th>Famous Feature</th></tr><tr><td>Kerala</td><td>Backwaters</td></tr><tr><td>Rajasthan</td><td>Desert</td></tr><tr><td>West Bengal</td><td>Sundarbans</td></tr><tr><td>Punjab</td><td>Backwaters</td></tr></table>\nWhich row contains incorrect information?",
o:["Kerala – Backwaters","Rajasthan – Desert","West Bengal – Sundarbans","Punjab – Backwaters"],
a:3,
e:"Punjab is known as the land of five rivers; it is not known for backwaters."
},
{
q:"An exchange student visits a school in Gujarat. During the morning assembly, students welcome the guest in their state's main language before presenting a cultural programme.\n\nWhich language are the students most likely speaking?",
o:["Gujarati","Bengali","Punjabi","Malayalam"],
a:0,
e:"Gujarati is the official and principal language spoken in Gujarat."
},
{
q:"A history club is planning an educational trip for students to learn about magnificent forts, palaces, and the royal heritage of India.\n\nWhich state should they choose?",
o:["Kerala","Rajasthan","Goa","Assam"],
a:1,
e:"Rajasthan is world-famous for its historic palaces, royal heritage, and forts."
},
{
q:"A family decorates their home with lamps, lights, and colourful rangoli. They celebrate the victory of good over evil by sharing sweets with neighbours.\n\nWhich festival are they celebrating?",
o:["Eid","Christmas","Diwali","Navroz"],
a:2,
e:"Diwali is celebrated with lamps, rangoli, and sweets to symbolise light over darkness."
},
{
q:"A student prepares the following list for a heritage quiz:\n\n• Meenakshi Temple – Tamil Nadu\n• Gateway of India – Mumbai\n• Hawa Mahal – Jaipur\n• Taj Mahal – Chennai\n\nWhich pair is incorrect?",
o:["Meenakshi Temple – Tamil Nadu","Gateway of India – Mumbai","Hawa Mahal – Jaipur","Taj Mahal – Chennai"],
a:3,
e:"The Taj Mahal is located in Agra, not Chennai."
},
{
q:"\"Today I reached Port Blair. I learnt that it is the capital city of one of India's Union Territories surrounded by the sea.\"\n\nWhich Union Territory is the traveller visiting?",
o:["Ladakh","Delhi","Puducherry","Andman and Nicobar Islands"],
a:3,
e:"Port Blair is the capital city of the Andaman and Nicobar Islands."
},
{
q:"Assertion (A): India is known as a diverse country.\nReason (R): People across India speak different languages and follow different traditions while living together.",
o:[
  "Both A and R are true, and R is the correct explanation of A.",
  "Both A and R are true, but R is not the correct explanation of A.",
  "A is true, but R is false.",
  "A is false, but R is true."
],
a:0,
e:"Both statements are correct; the coexistence of different languages and cultures proves its diversity."
},
{
q:"Riya wants to spend her summer vacation in a place with snow-covered mountains, cool weather, and beautiful valleys.\n\nWhich region of India should she visit?",
o:["Northern India","Southern India","Western India","Coastal India"],
a:0,
e:"Northern India includes the Himalayan mountain ranges, valleys, and snowscapes."
},
{
q:"A travel company receives the following request from a family:\n\"We would like to visit a famous white marble monument located in Agra during our holiday.\"\n\nWhich place should the travel company recommend?",
o:["Gateway of India","Taj Mahal","Meenakshi Temple","Jaisalmer Fort"],
a:1,
e:"The Summary text shows the Taj Mahal is the world-famous white marble monument in Agra."
},
{
q:"A class is preparing a display board for Independence Day. The teacher asks students to choose pictures and ideas that best represent India's Unity in Diversity.\n\nWhich set should they select?",
o:[
  "One language and one festival only",
  "One state and one city only",
  "Different languages, festivals, clothes, food, and traditions living together peacefully",
  "Only famous monuments"
],
a:2,
e:"Unity in diversity is perfectly displayed when various regional backgrounds coexist harmoniously."
}
];

/* LOAD QUESTION */
function load(){
clearInterval(interval);
lock=false;
attempt=0;
startTimer();

let q=questions[i];

document.getElementById("q").innerHTML=q.q;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";

q.o.forEach((op,idx)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=op;
div.onclick=()=>check(idx,div);
document.getElementById("options").appendChild(div);
});
}

/* CHECK ANSWER */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt===2){
document.getElementById("feedback").innerText=
"Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2000);
}
}
}

/* NEXT */
function next(){
clearInterval(interval);
i++;
if(i<questions.length){
load();
}else end();
}

/* END */
function end(){
clearInterval(interval);
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText=
"Score: "+score+"/"+questions.length;
}

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="block";
load();
},5000);

</script>

</body>
</html>
