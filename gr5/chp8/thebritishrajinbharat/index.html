<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Engine v4 - Rebuilt</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #d9b3ff, #f3e6ff);
  overflow:hidden;
  color:#111;
}

/* CONFETTI */
#confetti{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:999;
}

.piece{
  position:absolute;
  width:10px;
  height:10px;
  animation: fall 2.2s linear forwards;
}

.star{
  background:gold;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
}

.circle{
  background:#ff66cc;
  border-radius:50%;
}

.spark{
  background:#66ffff;
  transform:rotate(45deg);
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{width:220px}

/* GAME */
#game{
  display:none;
  padding:20px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:bold;
}

.box{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.15);
}

#q{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

table{
  margin:auto;
  border-collapse:collapse;
  margin-bottom:10px;
}
th,td{
  border:1px solid #ccc;
  padding:8px;
}
th{
  background:#e9c9ff;
}

/* OPTIONS */
.option{
  display:block;
  margin:10px 0;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  background:#f5f5f5;
  cursor:pointer;
}
.option:hover{background:#eee1ff;}

.correct{background:#b8f7c6 !important;}
.wrong{background:#ffb3b3 !important;}

/* RESULT */
#result{
  display:none;
  padding:40px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#7a3cff;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div id="confetti"></div>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/logo.png">
</div>

<!-- GAME -->
<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="table"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
  <h2>🏆 Great Work!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

/* ---------------- ENGINE STATE ---------------- */
let i=0,score=0,time=45,attempt=0,lock=false,interval=null;

/* ---------------- CONFETTI ---------------- */
function confetti(){
for(let x=0;x<25;x++){
let p=document.createElement("div");
p.className="piece";

let r=Math.random();
if(r<0.33)p.classList.add("star");
else if(r<0.66)p.classList.add("circle");
else p.classList.add("spark");

p.style.left=Math.random()*100+"%";
p.style.top="-10px";

document.getElementById("confetti").appendChild(p);
setTimeout(()=>p.remove(),2200);
}
}

/* ---------------- QUESTIONS ---------------- */
let questions=[
{
q:"Which text helps in governance systems?",
o:["Stupa","Arthashastra","Chaitya","Edict"],
a:1,
e:"Arthashastra explains administration."
},
{
type:"table",
q:"Study the table and answer:",
table:{
h:["Empire","Contribution"],
r:[
["Mauryan","Ashokan Pillars"],
["Gupta","Math & Science"],
["Mughal","Taj Mahal"],
["Gupta","Land Revenue"]
]
},
o:["Mauryan","Gupta","Mughal","Satavahana"],
a:1,
e:"Gupta entry is incorrect in table."
},
{
q:"Which emperor promoted peace?",
o:["Babur","Ashoka","Akbar","Shivaji"],
a:1,
e:"Ashoka spread Dhamma."
},
{
q:"Which is NOT Mauryan?",
o:["Ashokan Pillars","Chanakya","Arthashastra","Taj Mahal"],
a:3,
e:"Taj Mahal is Mughal."
},
{
q:"What does Swadeshi promote?",
o:["Foreign goods","Local goods","Taxes","War"],
a:1,
e:"Supports local production."
}
];

/* ---------------- TIMER SAFE ---------------- */
function startTimer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) next();
},1000);
}

/* ---------------- LOAD QUESTION ---------------- */
function load(){
lock=false;
attempt=0;

let q=questions[i];

document.getElementById("q").innerText=q.q;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";
document.getElementById("table").innerHTML="";

/* TABLE SAFE RENDER */
if(q.type==="table"){
let html="<table><tr>";
q.table.h.forEach(h=>html+=`<th>${h}</th>`);
html+="</tr>";

q.table.r.forEach(r=>{
html+="<tr>";
r.forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
});

html+="</table>";
document.getElementById("table").innerHTML=html;
}

/* OPTIONS */
q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
document.getElementById("options").appendChild(d);
});

startTimer();
}

/* ---------------- CHECK ---------------- */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
confetti();

score++;
document.getElementById("score").innerText="Score: "+score;

lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt===2){
document.getElementById("feedback").innerText=
"Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,1800);
}
}
}

/* ---------------- NEXT SAFE ---------------- */
function next(){
clearInterval(interval);

i++;
if(i<questions.length){
load();
}else end();
}

/* ---------------- END ---------------- */
function end(){
clearInterval(interval);
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText="Score: "+score+"/"+questions.length;
}

/* ---------------- START ---------------- */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="block";
load();
},5000);

</script>

</body>
</html>
