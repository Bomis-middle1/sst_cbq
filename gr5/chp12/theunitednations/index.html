<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 12 - United Nations</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  color:#fff;
}

/* 🌐 UN THEME BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#0a3d91,#ffffff,#d62828);
  z-index:-1;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
#splash img{
  width:220px;
}

/* GAME BOX */
#game{
  display:none;
  padding:20px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  font-weight:bold;
  color:#0a3d91;
}

.box{
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.95);
  color:#000;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
}

#q{
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
}

/* OPTIONS */
.option{
  display:block;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  background:#f4f4f4;
  cursor:pointer;
  font-size:18px;
  border:1px solid #ccc;
}

.option:hover{
  background:#e8f0ff;
}

.correct{background:#b7f7c1 !important;}
.wrong{background:#ffb3b3 !important;}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:40px;
  color:#0a3d91;
}

button{
  padding:12px 20px;
  font-size:18px;
  border:none;
  background:#0a3d91;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

/* 🎉 CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  background:red;
  top:-10px;
  animation:fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/logo.png">
</div>

<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="options"></div>
</div>

</div>

<div id="result">
  <h2>🌍 Excellent Work!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

let i=0,score=0,time=45,lock=false,interval;

/* QUESTIONS (MODIFIED CBSE LEVEL) */
const questions=[
{
q:"Two neighbouring countries have been arguing over their border for many years. Their leaders decide not to fight a war and instead agree to seek a peaceful legal solution through an international organisation. Which United Nations body is most suitable to help resolve this dispute?",
o:["General Assembly","International Court of Justice","UNESCO","UNICEF"],
a:1
},
{
q:"Heavy floods have affected thousands of families in a country. Many children have lost access to food, clean drinking water, healthcare and schools. The government requests help from the United Nations. Which UN agency would play the most important role in protecting the children's needs?",
o:["UNESCO","WHO","UNICEF","Security Council"],
a:2
},
{
q:"During a Model United Nations (MUN) programme, students represent different countries. Instead of arguing, they discuss climate change, share ideas and work together to prepare common solutions. What is the main purpose of conducting such an activity?",
o:["To teach students how countries cooperate to solve global problems","To choose world leaders","To organise sports competitions","To compare different school systems"],
a:0
},
{
q:"A country has started a project to restore damaged historical monuments while also improving the quality of education in villages. The government wants support from a UN agency that works in both these areas. Which agency should it approach?",
o:["WHO","WFP","UNESCO","Security Council"],
a:2
},
{
q:"Assertion: United Nations Day is celebrated every year on 24 October. Reason: This day marks the anniversary of the establishment of the United Nations.",
o:["Both statements are true and the reason correctly explains the assertion.","Both statements are true but the reason does not explain the assertion.","Assertion is true but Reason is false.","Assertion is false but Reason is true."],
a:0
},
{
q:"A dangerous disease spreads quickly across several countries. Governments need expert guidance on preventing infections, improving hospitals and protecting public health. Which UN agency would provide the best support?",
o:["WHO","UNESCO","WFP","General Assembly"],
a:0
},
{
q:"A student preparing for a quiz says, 'UNICEF is one of the six main organs of the United Nations.' Another student politely corrects the statement. Which explanation is correct?",
o:["UNICEF is a specialised UN agency that works for children, not one of the main organs.","UNICEF manages the Security Council.","UNICEF settles international disputes.","UNICEF elects the Secretary-General."],
a:0
},
{
q:"During a classroom discussion, Ravi says, 'The Security Council mainly works to improve education and preserve cultural heritage across the world.' Which statement correctly identifies Ravi's mistake?",
o:["The Security Council mainly works to maintain international peace and security.","The Security Council provides food during disasters.","The Security Council protects children's rights.","The Security Council promotes tourism."],
a:0
},
{
q:"News reports show Indian soldiers wearing blue helmets while helping maintain peace in a country affected by civil conflict. Their duty is to protect civilians and support peace without taking sides. This is an example of:",
o:["Peacekeeping Mission","Military invasion","Trade agreement","Tourism programme"],
a:0
},
{
q:"A newly independent nation wants friendly relations with all countries but decides not to join any military alliance during the Cold War. Instead, it wishes to remain independent while promoting peace. Which movement supports this idea?",
o:["World Food Programme","Security Council","Non-Aligned Movement (NAM)","UNICEF"],
a:2
},
{
q:"A remote village is facing two serious problems: Many children have stopped attending school, and several families are suffering from severe food shortages after a drought. Which combination of UN agencies would be the most suitable to help the village?",
o:["WHO and Security Council","UNICEF and WFP","UNESCO and International Court of Justice","General Assembly and WHO"],
a:1
},
{
q:"Representatives from almost every country gather at a large international meeting to discuss climate change. Each country shares its views before voting on recommendations to protect the environment. Which UN body is conducting this meeting?",
o:["General Assembly","WHO","UNICEF","International Court of Justice"],
a:0
},
{
q:"Assertion: India played an important role in the formation of the Non-Aligned Movement. Reason: India wanted nations to remain independent and promote peaceful coexistence.",
o:["Both statements are true and the reason correctly explains the assertion.","Both statements are true but the reason does not explain the assertion.","Assertion is true but Reason is false.","Assertion is false but Reason is true."],
a:0
}
];

/* TIMER */
function startTimer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) next();
},1000);
}

/* CONFETTI */
function confetti(){
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#0a3d91","#d62828","#ffffff"][Math.floor(Math.random()*3)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),3000);
}
}

/* LOAD */
function load(){
clearInterval(interval);
lock=false;
startTimer();

let q=questions[i];
document.getElementById("q").innerText=q.q;
document.getElementById("options").innerHTML="";

q.o.forEach((op,idx)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=op;
div.onclick=()=>check(idx,div);
document.getElementById("options").appendChild(div);
});
}

/* CHECK */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
confetti();
lock=true;
setTimeout(next,800);
}else{
el.classList.add("wrong");
document.getElementById("wrongSound").play();
}
}

/* NEXT */
function next(){
clearInterval(interval);
i++;
if(i<questions.length){
load();
}else end();
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText=
"Score: "+score+"/"+questions.length;
}

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="block";
load();
},4000);

</script>

</body>
</html>
