<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>History CBQ Fixed Engine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #f3e5c8, #fff1c1);
  overflow:hidden;
}

/* floating stars */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}
.star{
  position:absolute;
  width:6px;
  height:6px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
  animation:fall 6s linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* splash */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{width:220px}

/* game */
#game{
  display:none;
  text-align:center;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:20px;
  font-weight:bold;
}

.box{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

#q{
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* table */
table{
  margin:auto;
  border-collapse:collapse;
  margin-bottom:15px;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
}
th{
  background:#ffe7a8;
}

/* options */
.option{
  display:block;
  margin:10px 0;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  background:#f7f7f7;
  cursor:pointer;
}
.option:hover{background:#eef6ff;}

.correct{background:#bff5bf !important;}
.wrong{background:#ffbdbd !important;}

/* feedback */
#feedback{
  margin-top:10px;
  font-size:16px;
}

/* result */
#result{
  display:none;
  padding:40px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/logo.png">
</div>

<!-- GAME -->
<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="table"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
  <h2>🎉 Excellent Work!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

/* background stars */
for(let i=0;i<20;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  document.getElementById("bg").appendChild(s);
}

/* splash */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadQ();
},5000);

/* QUESTIONS */
let questions=[
{
type:"mcq",
q:"A museum label says 500 BCE. What does it mean?",
o:["After CE started","Before CE started","500 years ago","Modern year"],
a:1,
e:"BCE means Before Common Era."
},
{
type:"table",
q:"Study the table and answer:",
table:{
h:["Year","Event"],
r:[
["2500 BCE","Pyramids"],
["776 BCE","Olympics"],
["321 BCE","Mauryan Empire"]
]
},
o:["Pyramids","Olympics","Mauryan Empire","All same"],
a:2,
e:"321 BCE is most recent among BCE dates."
},
{
type:"mcq",
q:"Why do historians divide history into periods?",
o:["To organize time","To reduce facts","To remove history","To confuse students"],
a:0,
e:"It helps structure timelines."
},
{
type:"mcq",
q:"Which is NOT a primary source?",
o:["Diary","Coin","Stone","Textbook"],
a:3,
e:"Textbooks are secondary sources."
},
{
type:"mcq",
q:"If no written records exist, historians use:",
o:["Artifacts","Guessing","Internet","Stories only"],
a:0,
e:"Objects and ruins help reconstruct history."
}
];

let i=0,score=0,time=45,attempt=0,lock=false,interval;

/* TIMER */
function timer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time==0) next();
},1000);
}

/* LOAD QUESTION */
function loadQ(){
lock=false;
attempt=0;
timer();

let q=questions[i];

document.getElementById("q").innerText=q.q;
document.getElementById("feedback").innerText="";
document.getElementById("options").innerHTML="";
document.getElementById("table").innerHTML="";

/* TABLE */
if(q.type==="table"){
let html="<table><tr>";
q.table.h.forEach(h=>html+=`<th>${h}</th>`);
html+="</tr>";

q.table.r.forEach(r=>{
html+="<tr>";
r.forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
});

html+="</table>";
document.getElementById("table").innerHTML=html;
}

/* OPTIONS */
q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
document.getElementById("options").appendChild(d);
});
}

/* CHECK ANSWER */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText="Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2000);
}
}
}

/* NEXT */
function next(){
i++;
if(i<questions.length) loadQ();
else end();
}

/* END */
function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText="Score: "+score;
}

</script>

</body>
</html>
