<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chapter 11 - Bharat Democracy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  color:#000;
}

/* 🇮🇳 TRICOLOUR BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: linear-gradient(
    to bottom,
    #ff9933 0%,
    #ffffff 35%,
    #ffffff 65%,
    #138808 100%
  );
  z-index:-1;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{
  width:240px;
}

/* GAME */
#game{
  display:none;
  padding:20px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  font-weight:bold;
}

.box{
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.9);
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#q{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

/* OPTIONS */
.option{
  display:block;
  margin:10px 0;
  padding:15px;
  font-size:20px;
  border-radius:10px;
  background:#fff;
  border:1px solid #ccc;
  cursor:pointer;
}

.option:hover{
  background:#f0f0f0;
}

.correct{background:#b8f7c6 !important;}
.wrong{background:#ffb3b3 !important;}

#feedback{
  margin-top:10px;
  font-size:18px;
}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:40px;
}

button{
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  cursor:pointer;
}

/* ⭐ CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: gold;
  top: -10px;
  animation: fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/logo.png">
</div>

<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <div id="q"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<div id="result">
  <h2>🇮🇳 Excellent Work!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

let i=0,score=0,time=45,attempt=0,lock=false,interval;

/* TIMER */
function startTimer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) next();
},1000);
}

/* ⭐ CONFETTI */
function confetti(){
for(let i=0;i<30;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["#ff9933","#ffffff","#138808"][Math.floor(Math.random()*3)];
document.body.appendChild(d);
setTimeout(()=>d.remove(),3000);
}
}

/* CBQ QUESTIONS (NO TABLE) */
const questions=[
{
q:"Class 5 is choosing its class monitor. Every student gets one vote, and the candidate with the highest number of votes becomes the monitor. The teacher reminds everyone that every vote is equally important. Which democratic principle does this activity show?",
o:["Rule by one person","Participation of people","Monarchy","Dictatorship"],
a:1,
e:"Democracy gives everyone equal opportunity to participate."
},
{
q:"Harmony Week Celebration: Students from different religions are invited to explain their festivals, traditions, and customs. Everyone is encouraged to respect each other's beliefs. Which constitutional value is highlighted in this notice?",
o:["Secularism","Monarchy","Exploitation","Dictatorship"],
a:0,
e:"Secularism means respecting and treating all religions equally."
},
{
q:"A school announces that only boys can join the Robotics Club, while girls are not allowed to participate even if they are interested. Which Fundamental Right is being violated?",
o:["Right to Freedom of Religion","Right to Equality","Right against Exploitation","Cultural and Educational Rights"],
a:1,
e:"Excluding individuals based on gender violates the Right to Equality."
},
{
q:"The local government has built new schools, repaired roads, and opened a health centre in a remote village after listening to the needs of the people. What does this show about a democratic government?",
o:["It works only for elected leaders.","It works for the welfare of the people.","It ignores public opinion.","It makes decisions without consulting citizens."],
a:1,
e:"A democratic government is elected to serve and care for the citizens."
},
{
q:"Assertion (A): Citizens in a democracy can remove a government through elections. Reason (R): Democratic governments are accountable to the people.",
o:["Both A and R are true, and R correctly explains A.","Both A and R are true, but R does not explain A.","A is true, but R is false.","A is false, but R is true."],
a:0,
e:"Elections ensure that an accountable government remains answerable to its people."
},
{
q:"Nisha writes an article in her school magazine suggesting ways to reduce plastic waste and improve cleanliness in the school. She respectfully shares her opinions with everyone. Which Fundamental Right allows her to express her views?",
o:["Right to Equality","Right to Freedom","Right against Exploitation","Right to Constitutional Remedies"],
a:1,
e:"The Right to Freedom guarantees the freedom of speech and expression."
},
{
q:"Four students behave differently during a school picnic: Aarav stands respectfully during the National Anthem. Meera puts waste only in the dustbin. Kabir writes his name on a public monument. Zoya helps younger students cross the road safely. Who is not performing the duties of a responsible citizen?",
o:["Aarav","Meera","Kabir","Zoya"],
a:2,
e:"Defacing public property goes against the fundamental duties of a citizen."
},
{
q:"Officials rescued several children who were working in a dangerous factory. The children were sent back to school, and action was taken against the factory owner. Which Fundamental Right protects these children?",
o:["Right against Exploitation","Right to Freedom","Right to Equality","Freedom of Religion"],
a:0,
e:"The Right against Exploitation bans child labour and protects minors."
},
{
q:"During a school election, a few students say that only children from one section should be allowed to vote because they are 'more responsible.' If the teacher wants to follow democratic values, what should she do?",
o:["Allow only one section to vote.","Let class leaders decide the winner.","Give every student an equal chance to vote.","Cancel the election."],
a:2,
e:"Democratic values demand equal voting rights for everyone without discrimination."
},
{
q:"A tribal community starts a learning centre where children are taught their traditional language, songs, and folk dances so that these can be preserved for future generations. Which Fundamental Right supports this effort?",
o:["Right against Exploitation","Right to Equality","Cultural and Educational Rights","Right to Constitutional Remedies"],
a:2,
e:"Cultural and Educational Rights preserve minority cultures and traditions."
},
{
q:"Your class is writing a 'Classroom Constitution.' Four students suggest different rules. Which rule best reflects the values of the Indian Constitution?",
o:["Only class toppers may share their opinions.","Every student may express opinions respectfully, and everyone will be treated equally.","One student will make all classroom decisions.","Different rules will apply to different groups of students."],
a:1,
e:"Equality and respect for all opinions lie at the heart of our Constitution."
},
{
q:"Riya notices that some students are not allowed to participate in the annual sports meet because of their family background. She feels this is unfair. What should Riya do to uphold democratic values?",
o:["Ignore the matter because it does not affect her.","Support the decision made by others.","Encourage equal opportunities and inform the teacher about the unfair treatment.","Ask only her friends to participate."],
a:2,
e:"Upholding democracy means speaking out against discrimination and promoting fairness."
}
];

/* LOAD */
function load(){
clearInterval(interval);
lock=false;
attempt=0;
startTimer();

let q=questions[i];
document.getElementById("q").innerText=q.q;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";

q.o.forEach((op,idx)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=op;
div.onclick=()=>check(idx,div);
document.getElementById("options").appendChild(div);
});
}

/* CHECK */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
confetti();
lock=true;
setTimeout(next,900);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt===2){
document.getElementById("feedback").innerText=
"Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2000);
}
}
}

/* NEXT */
function next(){
clearInterval(interval);
i++;
if(i<questions.length){
load();
}else end();
}

/* END */
function end(){
clearInterval(interval);
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText=
"Score: "+score+"/"+questions.length;
}

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="block";
load();
},5000);

</script>

</body>
</html>
