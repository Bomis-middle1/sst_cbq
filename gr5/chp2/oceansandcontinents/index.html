<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oceans & Continents - CBQ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(to bottom, #cfefff, #e8f7ff, #ffffff);
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
#splash img{
  width:220px;
}

/* GAME */
#game{
  display:none;
  padding:15px;
  text-align:center;
}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  padding:10px;
}

.box{
  max-width:850px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.option{
  display:block;
  margin:10px 0;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  background:#f8f8f8;
  transition:0.2s;
}

.option:hover{
  background:#e6f6ff;
}

.correct{background:#bff5bf !important;}
.wrong{background:#ffbdbd !important;}

#feedback{
  margin-top:10px;
  font-size:14px;
  color:#333;
}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:30px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#4caf50;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <img src="assets/logo.png">
</div>

<!-- GAME -->
<div id="game">

<div class="top">
  <div id="score">Score: 0</div>
  <div id="timer">45</div>
</div>

<div class="box">
  <h3 id="q"></h3>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

</div>

<!-- RESULT -->
<div id="result">
  <h2>🌊 Great Explorer!</h2>
  <p id="final"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("game").style.display="block";
  loadQ();
},5000);

let questions = [
{
q:"A satellite image shows Earth mostly blue. What best explains this?",
o:["Earth has more oceans than land","Clouds are blue","Land is painted blue","Oceans are small"],
a:0,
e:"Oceans cover most of Earth’s surface."
},
{
q:"Only a small portion of Earth’s water is usable. What is true?",
o:["All water is drinkable","Freshwater is limited","Oceans are freshwater","Water is unlimited"],
a:1,
e:"Freshwater is limited."
},
{
q:"Why are oceans important for life?",
o:["They produce oxygen and regulate climate","They create mountains","They stop earthquakes","They remove land"],
a:0,
e:"Marine plants produce oxygen."
},
{
q:"Why do coastal regions have milder climates?",
o:["Land heats faster than water","Water regulates temperature","Mountains block sun","Winds stop heat"],
a:1,
e:"Water heats and cools slowly."
},
{
q:"A ship moves west from India. Which ocean/sea is reached first?",
o:["Pacific Ocean","Arabian Sea","Atlantic Ocean","Arctic Ocean"],
a:1,
e:"Arabian Sea is west of India."
},
{
q:"Europe and Asia are best described as:",
o:["Separate islands","One landmass (Eurasia)","Different planets","Ocean regions"],
a:1,
e:"They form Eurasia."
},
{
q:"Why do islands have unique species?",
o:["Isolation from mainland","No sunlight","No water","Too many people"],
a:0,
e:"Isolation leads to unique evolution."
},
{
q:"Why are oceans called Earth's 'lungs'?",
o:["They create land","They produce oxygen","They stop wind","They cool mountains"],
a:1,
e:"Marine plants produce oxygen."
},
{
q:"After underwater earthquake, coastal warning is given because:",
o:["Tsunami may form","Rainfall increases","Snowfall happens","Wind stops"],
a:0,
e:"Seafloor movement causes tsunami."
},
{
q:"Which statement is NOT correct?",
o:["Pacific is largest ocean","Australia is smallest continent","Freshwater is unlimited","Land is more in North Hemisphere"],
a:2,
e:"Freshwater is NOT unlimited."
},
{
q:"Why is Southern Hemisphere climate milder?",
o:["More ocean area","No sunlight","No land","No wind"],
a:0,
e:"Water moderates temperature."
},
{
q:"Why is globe better than map?",
o:["Shows true Earth shape","More colorful","Smaller size","Cheaper"],
a:0,
e:"Globe represents Earth accurately."
}
];

let i=0,score=0,time=45,lock=false,attempt=0,interval;

function timer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time==0) next();
},1000);
}

function loadQ(){
lock=false;
attempt=0;
timer();

let q=questions[i];
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";
document.getElementById("feedback").innerText="";

q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
box.appendChild(d);
});
}

function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText="Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2500);
}
}
}

function next(){
i++;
if(i<questions.length){
loadQ();
}
else end();
}

function end(){
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText="Final Score: "+score+"/"+questions.length;
}

</script>

</body>
</html>
