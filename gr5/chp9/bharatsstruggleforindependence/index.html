<script>

let i=0,score=0,time=45,attempt=0,lock=false,interval;

/* TIMER */
function timer(){
clearInterval(interval);
time=45;
document.getElementById("timer").innerText=time;

interval=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0) next();
},1000);
}

/* QUESTIONS */
let questions=[
{
q:"Read the passage. Arjun visited a museum where he saw photographs of a leader who believed that people should always fight injustice peacefully. The display explained that truth and non-violence inspired millions to join the freedom struggle. Who is the leader described above?",
o:["Bhagat Singh","Mahatma Gandhi","Chandrasekhar Azad","Surya Sen"],
a:1,
e:"Gandhi promoted Ahimsa."
},
{
q:"Read the newspaper report. \"The government has passed a law allowing people to be arrested without a trial. Citizens across Bharat have begun protesting against this unfair law.\" Which law is being referred to?",
o:["Salt Law","Rowlatt Act","Forest Law","Education Act"],
a:1,
e:"The Rowlatt Act allowed detention without trial."
},
{
q:"Read the passage. Many people had gathered peacefully at Jallianwala Bagh in Amritsar. Suddenly, British troops opened fire on the unarmed crowd. The incident shocked the entire country. Why did this event increase public anger against British rule?",
o:["British soldiers distributed free food.","Peaceful people were fired upon.","The meeting was cancelled.","The festival ended peacefully."],
a:1,
e:"The massacre of unarmed people caused outrage."
},
{
q:"A school organises a Freedom Exhibition. One group decorates its stall with spinning wheels (charkhas), Khadi clothes, and posters encouraging people to boycott British goods. Which movement is the group representing?",
o:["Quit India Movement","Revolutionary Movement","Non-Cooperation Movement","Revolt of 1857"],
a:2,
e:"Swadeshi encouraged local goods."
},
{
q:"Assertion (A): Gandhi ended the Non-Cooperation Movement in 1922. Reason (R): Violence broke out at Chauri Chaura during the movement. A. Both A and R are true, and R is the correct explanation of A. B. Both A and R are true, but R is not the correct explanation of A. C. A is true, but R is false. D. A is false, but R is true.",
o:["Both A and R are true, and R is the correct explanation of A.","Both A and R are true, but R is not the correct explanation of A.","A is true, but R is false.","A is false, but R is true."],
a:0,
e:"Gandhi withdrew the movement after the Chauri Chaura violence."
},
{
q:"Read the situation. A young freedom fighter believes that British rule can only be ended through armed struggle. He wishes to join an organisation that follows revolutionary methods instead of non-violent protests. Which organisation is he most likely to join?",
o:["Satyagraha Ashram","Hindustan Republican Association","Swadeshi Movement","Indian Civil Service"],
a:1,
e:"The Hindustan Republican Association used revolutionary methods."
},
{
type:"table",
q:"Read the timeline. Which option correctly shows the sequence of these events?",
table:{
h:["Year","Event"],
r:[
["1919","Jallianwala Bagh Massacre"],
["1930","Salt March"],
["1942","Quit India Movement"]
]
},
o:["Jallianwala Bagh Massacre → Salt March → Quit India Movement","Quit India Movement → Salt March → Jallianwala Bagh Massacre","Salt March → Jallianwala Bagh Massacre → Quit India Movement","Jallianwala Bagh Massacre → Quit India Movement → Salt March"],
a:0,
e:"The sequence follows the years shown in the timeline."
},
{
q:"A student sees a photograph of Mahatma Gandhi walking with followers towards the seashore to make salt in protest against an unfair British law. Which movement does this photograph represent?",
o:["Non-Cooperation Movement","Quit India Movement","Civil Disobedience Movement","Revolutionary Movement"],
a:2,
e:"The Salt March was part of the Civil Disobedience Movement."
},
{
type:"table",
q:"Study the table. Based on the table, which event took place after the Salt March?",
table:{
h:["Year","Event"],
r:[
["1919","Jallianwala Bagh Massacre"],
["1921","Non-Cooperation Movement"],
["1930","Salt March"],
["1942","Quit India Movement"]
]
},
o:["Jallianwala Bagh Massacre","Non-Cooperation Movement","Quit India Movement","None of these"],
a:2,
e:"Quit India Movement happened after the Salt March."
},
{
q:"Read the speech. \"The time has come for the British to leave India. We must unite and continue our struggle until our country becomes free.\" Which movement is this speech most likely referring to?",
o:["Swadeshi Movement","Civil Disobedience Movement","Quit India Movement","Revolt of 1857"],
a:2,
e:"The speech matches the Quit India Movement."
},
{
q:"A student is arranging important events of India's freedom struggle in chronological order. Which event should be placed last on the timeline?",
o:["Jallianwala Bagh Massacre","Non-Cooperation Movement","Quit India Movement","Arrival of Gandhi in India"],
a:2,
e:"Quit India Movement is the latest event listed."
},
{
q:"Read the diary entry. \"Today our country finally became independent. While everyone celebrated freedom, many families were sad because the country had been divided into two separate nations.\" Which historical event is described in the diary?",
o:["Civil Disobedience Movement","Partition of Bharat","Rowlatt Act","Salt March"],
a:1,
e:"The diary describes the Partition of Bharat."
},
{
q:"A group of students wants to protest against an unfair school rule. They decide to remain peaceful, refuse to use the rule, and avoid damaging any property. Which principle of Mahatma Gandhi are they following?",
o:["Violent protest","Non-violence and peaceful resistance","Armed revolution","Military action"],
a:1,
e:"They are following non-violence and peaceful resistance."
}
];

/* LOAD */
function load(){
lock=false;
attempt=0;
timer();

let q=questions[i];

document.getElementById("q").innerText=q.q;
document.getElementById("options").innerHTML="";
document.getElementById("feedback").innerText="";
document.getElementById("table").innerHTML="";

/* TABLE FIXED */
if(q.type==="table"){
let html="<table><tr>";
q.table.h.forEach(h=>html+=`<th>${h}</th>`);
html+="</tr>";

q.table.r.forEach(r=>{
html+="<tr>";
r.forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
});

html+="</table>";
document.getElementById("table").innerHTML=html;
}

/* OPTIONS */
q.o.forEach((op,idx)=>{
let d=document.createElement("div");
d.className="option";
d.innerText=op;
d.onclick=()=>check(idx,d);
document.getElementById("options").appendChild(d);
});
}

/* CHECK */
function check(ans,el){
if(lock) return;

let q=questions[i];

if(ans===q.a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
document.getElementById("score").innerText="Score: "+score;
lock=true;
setTimeout(next,800);
}
else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText=
"Correct Answer: "+q.o[q.a]+" → "+q.e;
lock=true;
setTimeout(next,2000);
}
}
}

/* NEXT */
function next(){
i++;
if(i<questions.length){
load();
}else end();
}

/* END */
function end(){
clearInterval(interval);
document.getElementById("game").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("clapSound").play();
document.getElementById("final").innerText="Score: "+score+"/"+questions.length;
}

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="block";
load();
},5000);

</script>
